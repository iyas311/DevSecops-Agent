version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    environment:
      - AWS_REGION=${AWS_REGION:-us-east-1}
      # AWS_PROFILE is intentionally omitted so boto3 uses the EC2 IAM role
      # (Instance Metadata Service) when running on AWS, and falls back to
      # ~/.aws/credentials for local development.
    volumes:
      - ~/.aws:/root/.aws:ro   # Ignored on EC2 if ~/.aws doesn't exist locally
    env_file:
      - .env

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "8501:8501"
    depends_on:
      - backend
